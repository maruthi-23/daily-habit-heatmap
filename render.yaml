services:
  - type: web
    name: habitmap-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: habitmap-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: habitmap-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: habitmap-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: habitmap-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: habitmap-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false        # set this to your Netlify URL after frontend deploys

databases:
  - name: habitmap-db
    plan: free
    databaseName: habitmap
    user: habitmap_user
