version: '3.9'

# Dev-only compose: just spins up PostgreSQL on port 5433
# Run backend & frontend locally with: mvn spring-boot:run  and  npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: habitmap-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: habitmap
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword123}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
    driver: local
